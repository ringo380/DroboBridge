name: DroboBridge
options:
  bundleIdPrefix: com.drobobridge
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  DroboBridge:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.drobobridge.app
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_NAME: DroboBridge
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: DroboBridge.entitlements
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        ENABLE_APP_SANDBOX: NO
        COMBINE_HIDPI_IMAGES: YES
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 DroboBridge. All rights reserved."
        INFOPLIST_KEY_CFBundleDisplayName: DroboBridge
    dependencies:
      - package: ZIPFoundation
      - sdk: IOKit.framework
      - sdk: DiskArbitration.framework
    entitlements:
      path: DroboBridge.entitlements

  DroboBridgeTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: DroboBridge
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.drobobridge.tests

packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    from: "0.9.0"
